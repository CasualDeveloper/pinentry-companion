name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # GitHub-hosted macOS runners currently cover 26, 15, and 14.
          # Older supported deployment targets require self-hosted/manual VMs.
          - name: macOS 26 Tahoe
            runner: macos-26
          - name: macOS 15 Sequoia
            runner: macos-15
          - name: macOS 14 Sonoma
            runner: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Runner versions
        run: |
          sw_vers
          uname -m
          swift --version

      - name: Build native release binary
        run: swift build -c release --product pinentry-companion

      - name: Build release binaries for supported architectures
        run: |
          swift build -c release --arch arm64 --product pinentry-companion
          swift build -c release --arch x86_64 --product pinentry-companion

      - name: Test
        run: swift run PinentryCompanionUnitTests

      - name: Protocol smoke test
        run: |
          output="$(printf 'NOP\nHELP\nBYE\n' | .build/release/pinentry-companion)"
          printf '%s\n' "$output"
          grep -q 'OK Hi from pinentry-companion!' <<< "$output"
          grep -q '# GETPIN' <<< "$output"
