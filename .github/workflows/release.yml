name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    name: Build release artifact
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: swift build -c release --product pinentry-companion

      - name: Package
        run: |
          mkdir -p dist
          arch="$(uname -m)"
          artifact="pinentry-companion-${GITHUB_REF_NAME}-macos-${arch}.tar.gz"
          echo "ARTIFACT=${artifact}" >> "$GITHUB_ENV"
          cp .build/release/pinentry-companion dist/pinentry-companion
          (cd dist && shasum -a 256 pinentry-companion > checksums.txt)
          tar -C dist -czf "dist/${artifact}" pinentry-companion checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ARTIFACT }}
